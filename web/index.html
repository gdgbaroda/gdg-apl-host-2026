<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>APL · Build with AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@500;700&family=Google+Sans+Text:wght@400;500&display=swap" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="brand">
        <div class="brand-row">
          <span class="dot dot-blue"></span>
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <h1>Build with AI</h1>
        <p class="subtitle">Agentic Premier League · GDG Baroda</p>
      </header>

      <section class="challenges" id="challenges"></section>

      <section class="reactions">
        <div class="r-head">
          <span class="r-label">React</span>
          <span class="status live" id="status">live</span>
        </div>
        <div class="r-grid" id="grid"></div>
        <p class="r-note">Just for fun — tap to send to the big screen.</p>
      </section>

      <footer class="foot">GDG Baroda · 2026</footer>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
