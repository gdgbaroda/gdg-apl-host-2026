<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>APL Host</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: system-ui, sans-serif; }
      #app, #poster { position: absolute; inset: 0; }
      #poster {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 10;
        transition: opacity 0.4s ease;
      }
      #poster.gone { opacity: 0; pointer-events: none; }
      #poster img { max-width: 100%; max-height: 100%; object-fit: contain; }
      #poster .hint {
        position: absolute;
        bottom: 4vh;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.2vw;
        opacity: 0.65;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .stage { display: grid; grid-template-rows: 1fr; height: 100vh; }
      webview {
        width: 100%; height: 100%;
        border: 0; background: #000;
      }
      #reactions-canvas {
        position: absolute; inset: 0;
        pointer-events: none;
        z-index: 5;
      }
      /* QR sticker — sits over the IPL/Hotstar top-left logo. */
      #qr-overlay {
        position: absolute;
        top: 64px;
        left: 14px;
        width: 140px;
        height: 140px;
        background: #fff;
        border-radius: 12px;
        padding: 8px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.45);
        z-index: 6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }
      #qr-overlay img { width: 100%; height: 100%; image-rendering: pixelated; }
      #qr-overlay .cap {
        position: absolute;
        bottom: -22px;
        left: 0; right: 0;
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="stage">
        <webview
          id="cricket"
          src="https://www.hotstar.com/in"
          allowpopups
          partition="persist:hotstar"
        ></webview>
      </div>
      <div id="qr-overlay">
        <img id="qr-img" alt="Scan to react" />
        <div class="cap">Scan to react</div>
      </div>
      <canvas id="reactions-canvas"></canvas>
    </div>

    <div id="poster">
      <img src="./poster.jpg" alt="" />
      <div class="hint">Press Space to start</div>
    </div>

    <script>
      const poster = document.getElementById('poster');
      let onPoster = true;

      document.addEventListener('keydown', (e) => {
        if (onPoster && (e.key === ' ' || e.key === 'Enter')) {
          e.preventDefault();
          onPoster = false;
          poster.classList.add('gone');
        } else if (!onPoster && e.key === 'Escape') {
          onPoster = true;
          poster.classList.remove('gone');
        }
      });
    </script>

    <script src="./electron/build-config.js"></script>
    <script>
      // Populate the QR image from baked config.
      (function () {
        const cfg = window.__APL__ || {};
        const img = document.getElementById('qr-img');
        if (img && cfg.qrDataUrl) img.src = cfg.qrDataUrl;
      })();
    </script>
    <script src="./electron/reactions-overlay.js"></script>
  </body>
</html>
