<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>APL Host</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: system-ui, sans-serif; }
      #app, #poster { position: absolute; inset: 0; }
      #poster {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 10;
        transition: opacity 0.4s ease;
      }
      #poster.gone { opacity: 0; pointer-events: none; }
      #poster img { max-width: 100%; max-height: 100%; object-fit: contain; }
      #poster .hint {
        position: absolute;
        bottom: 4vh;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.2vw;
        opacity: 0.65;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .stage { display: grid; grid-template-rows: 1fr; height: 100vh; }
      webview {
        width: 100%; height: 100%;
        border: 0; background: #000;
      }
      #reactions-canvas {
        position: absolute; inset: 0;
        pointer-events: none;
        z-index: 5;
      }
      /* QR sticker — sits over the IPL/Hotstar top-left logo. */
      #qr-overlay {
        position: absolute;
        top: 64px;
        left: 34px;
        width: 180px;
        height: 180px;
        background: #fff;
        border-radius: 12px;
        padding: 8px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.45);
        z-index: 6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }
      #qr-overlay.hidden { display: none; }
      #qr-overlay img { width: 100%; height: 100%; image-rendering: pixelated; }
      #qr-overlay .cap {
        position: absolute;
        bottom: -22px;
        left: 0; right: 0;
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #fff;
        text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      }

      /* Closing / Submit-Results page */
      #results-overlay {
        position: absolute; inset: 0;
        z-index: 20;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: #fff;
        font-family: "Google Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      #results-overlay.hidden { display: none; }
      .r-dots { display: flex; gap: 0.8vw; margin-bottom: 2vh; }
      .r-dots span {
        width: 1.1vw; height: 1.1vw; border-radius: 50%;
        min-width: 10px; min-height: 10px;
      }
      .r-dots .b { background: #4285F4; }
      .r-dots .r { background: #EA4335; }
      .r-dots .y { background: #FBBC04; }
      .r-dots .g { background: #34A853; }
      #results-overlay h1 {
        font-size: 5.5vw;
        font-weight: 700;
        margin: 0 0 1vh;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      #results-overlay .subtitle {
        color: #9aa0a6;
        font-size: 1.6vw;
        margin: 0 0 5vh;
        letter-spacing: 0.02em;
      }
      #results-overlay .qr-card {
        background: #fff;
        padding: 1.2vw;
        border-radius: 1.2vw;
        box-shadow: 0 12px 60px rgba(0,0,0,0.6);
      }
      #results-overlay .qr-card img {
        display: block;
        width: 30vw;
        max-width: 460px;
        height: auto;
        image-rendering: pixelated;
      }
      #results-overlay .url {
        margin-top: 3vh;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 1vw;
        color: #9aa0a6;
        letter-spacing: 0.04em;
      }
      #results-overlay .foot {
        position: absolute;
        bottom: 3vh;
        font-size: 0.85vw;
        color: #5f6368;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="stage">
        <webview
          id="cricket"
          src="https://www.hotstar.com/in"
          allowpopups
          partition="persist:hotstar"
        ></webview>
      </div>
      <div id="qr-overlay">
        <img id="qr-img" alt="Scan to react" />
        <div class="cap">Scan to react</div>
      </div>
      <canvas id="reactions-canvas"></canvas>
    </div>

    <div id="poster">
      <img src="./poster.jpg" alt="" />
      <div class="hint">Press Space to start</div>
    </div>

    <div id="results-overlay" class="hidden" aria-label="Submit results">
      <div class="r-dots" aria-hidden="true">
        <span class="b"></span><span class="r"></span><span class="y"></span><span class="g"></span>
      </div>
      <h1>That's a wrap.</h1>
      <p class="subtitle">Scan to submit your hackathon project.</p>
      <div class="qr-card"><img id="results-qr-img" alt="Submission form QR" /></div>
      <div class="url" id="results-url"></div>
      <div class="foot">Build with AI · Agentic Premier League</div>
    </div>

    <script>
      const poster = document.getElementById('poster');
      let onPoster = true;

      document.addEventListener('keydown', (e) => {
        if (onPoster && (e.key === ' ' || e.key === 'Enter')) {
          e.preventDefault();
          onPoster = false;
          poster.classList.add('gone');
        } else if (!onPoster && e.key === 'Escape') {
          onPoster = true;
          poster.classList.remove('gone');
        }
      });
    </script>

    <script src="./electron/build-config.js"></script>
    <script>
      // Populate the QR images from baked config.
      (function () {
        const cfg = window.__APL__ || {};
        const img = document.getElementById('qr-img');
        if (img && cfg.qrDataUrl) img.src = cfg.qrDataUrl;
        const rImg = document.getElementById('results-qr-img');
        if (rImg && cfg.formQrDataUrl) rImg.src = cfg.formQrDataUrl;
        const url = document.getElementById('results-url');
        if (url && cfg.formUrl) url.textContent = cfg.formUrl.replace(/^https?:\/\//, '');
      })();
    </script>
    <script src="./electron/reactions-overlay.js"></script>
  </body>
</html>
