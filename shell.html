<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>APL Host</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; color: #fff; font-family: system-ui, sans-serif; }
      #app, #poster { position: absolute; inset: 0; }
      #poster {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 10;
        transition: opacity 0.4s ease;
      }
      #poster.gone { opacity: 0; pointer-events: none; }
      #poster img { max-width: 100%; max-height: 100%; object-fit: contain; }
      #poster .hint {
        position: absolute;
        bottom: 4vh;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.2vw;
        opacity: 0.65;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .stage { display: grid; grid-template-rows: 1fr 22vh; height: 100vh; }
      webview, iframe { width: 100%; height: 100%; border: 0; background: #000; }
      #reactions-canvas {
        position: absolute; inset: 0;
        pointer-events: none;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="stage">
        <webview
          id="cricket"
          src="https://www.hotstar.com/in"
          allowpopups
          partition="persist:hotstar"
        ></webview>
        <iframe id="quiz" src="about:blank"></iframe>
      </div>
      <canvas id="reactions-canvas"></canvas>
    </div>

    <div id="poster">
      <img src="./poster.jpg" alt="" />
      <div class="hint">Press Space to start</div>
    </div>

    <script>
      const poster = document.getElementById('poster');
      let onPoster = true;

      document.addEventListener('keydown', (e) => {
        if (onPoster && (e.key === ' ' || e.key === 'Enter')) {
          e.preventDefault();
          onPoster = false;
          poster.classList.add('gone');
        } else if (!onPoster && e.key === 'Escape') {
          onPoster = true;
          poster.classList.remove('gone');
        }
      });
    </script>

    <script src="./electron/build-config.js"></script>
    <script src="./electron/reactions-overlay.js"></script>
  </body>
</html>
